<div class="tables-demo">
  <!-- Whisper container for toast messages from demo actions -->
  <i-whisper [position]="'top-right'" [key]="'global'"></i-whisper>

  <header class="demo-header">
    <h1>Table Component</h1>
  </header>

  <div class="cards-container">
    <!-- ── 1. Sorting & Filtering ─────────────────────────────────── -->
    <app-demo-card
      [title]="'Sorting & Filtering'"
      [sourceCode]="codeExamples.flat"
      [tsCode]="tsCodeExamples.flat"
    >
      <i-table
        [grid]="flatGrid"
        [sortable]="true"
        [filterable]="true"
        [globalFilter]="true"
        [height]="'360px'"
        [striped]="true"
        (onSort)="onSort($event)"
        (onFilter)="onFilter($event)"
      ></i-table>
    </app-demo-card>

    <!-- ── 2. Selection & Row Actions ────────────────────────────── -->
    <app-demo-card
      [title]="'Selection & Row Actions'"
      [sourceCode]="codeExamples.actions"
      [tsCode]="tsCodeExamples.actions"
    >
      <i-table
        [grid]="actionsGrid"
        selectionMode="multiple"
        dataKey="id"
        [(selection)]="selectedProducts"
        [hoverable]="true"
        [height]="'360px'"
        (onSelectionChange)="onSelectionChange($event)"
      ></i-table>
    </app-demo-card>

    <!-- ── 3. Expandable Detail Sub-Table ────────────────────────── -->
    <app-demo-card
      [title]="'Expandable Detail Sub-Table'"
      [sourceCode]="codeExamples.detail"
      [tsCode]="tsCodeExamples.detail"
    >
      <i-table [grid]="detailGrid" [sortable]="true" [striped]="true"></i-table>
    </app-demo-card>

    <!-- ── 4. Icon & Chip Columns ─────────────────────────────────── -->
    <app-demo-card
      [title]="'Icon & Chip Columns'"
      [sourceCode]="codeExamples.icons"
      [tsCode]="tsCodeExamples.icons"
    >
      <i-table
        [grid]="iconGrid"
        [sortable]="true"
        [height]="'360px'"
        [hoverable]="true"
      ></i-table>
    </app-demo-card>

    <!-- ── 5. Large Dataset + Download ───────────────────────────── -->
    <app-demo-card
      [title]="'Large Dataset — Virtual Scroll & Download'"
      [sourceCode]="codeExamples.large"
      [tsCode]="tsCodeExamples.large"
    >
      <i-table
        [grid]="largeGrid"
        [sortable]="true"
        [globalFilter]="true"
        [downloadable]="true"
        [virtualScroll]="true"
        downloadFormat="csv"
        [height]="'400px'"
        (onDownload)="onDownload($event)"
      ></i-table>
    </app-demo-card>
  </div>

  <!-- Features list -->
  <app-features-list [features]="features"></app-features-list>
</div>
